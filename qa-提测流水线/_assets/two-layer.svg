<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430">
  <style> text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;} </style>
  <defs>
    <marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0C8F88"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4A6FA5"/></marker>
  </defs>
  <rect width="1000" height="430" fill="#FFFFFF"/>
  <text x="500" y="40" text-anchor="middle" fill="#0F1721" font-size="18" font-weight="800">引擎 / 经验　两层分离</text>
  <rect x="40" y="76" width="400" height="266" rx="12" fill="#EAF6F5" stroke="#0C8F88" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="60" y="104" fill="#0C8F88" font-size="14" font-weight="800">引擎 · 跨项目通用</text>
  <text x="60" y="122" fill="#6A7480" font-size="11">搬过去基本不改，只换工具绑定</text>
  <rect x="75" y="138" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="240.0" y="168.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">流程编排（一条命令串七环）</text>
  <rect x="75" y="202" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="240.0" y="232.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">五个阶段能力（skill）</text>
  <rect x="75" y="266" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="240.0" y="296.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">并行评审加速器</text>
  <rect x="560" y="76" width="400" height="266" rx="12" fill="#EDF1F7" stroke="#4A6FA5" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="580" y="104" fill="#4A6FA5" font-size="14" font-weight="800">经验层 · 每项目自己长</text>
  <text x="580" y="122" fill="#6A7480" font-size="11">从空模板起步，一次次提测长出来</text>
  <rect x="595" y="138" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="760.0" y="168.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">判准库（什么算对）</text>
  <rect x="595" y="202" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="760.0" y="232.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">评审规则 + 门禁基线</text>
  <rect x="595" y="266" width="330" height="50" rx="8" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.4"/>
  <text x="760.0" y="296.0" text-anchor="middle" fill="#0F1721" font-size="15" font-weight="600">生产缺陷高频模式</text>
  <line x1="440" y1="200" x2="557" y2="200" stroke="#0C8F88" stroke-width="1.8" marker-end="url(#at)"/>
  <rect x="452" y="176" width="96" height="18" rx="3" fill="#FFFFFF"/>
  <text x="500" y="189" text-anchor="middle" fill="#0C8F88" font-size="12" font-weight="700">运行时加载</text>
  <path d="M960,300 C1000,300 1000,118 962,118" fill="none" stroke="#4A6FA5" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ab)"/>
  <text x="978" y="214" fill="#4A6FA5" font-size="11" font-weight="600" transform="rotate(90 978 214)">每次跑完回流</text>
  <text x="40" y="392" fill="#6A7480" font-size="12.5">流程通用、差异全落在经验层——这是它能跨项目复用、且越用越准的关键。</text>
</svg>