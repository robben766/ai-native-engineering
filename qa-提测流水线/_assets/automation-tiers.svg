  <text x="684.0" y="240" text-anchor="start" fill="#0F1721" font-size="13.5" font-weight="600">最终无人维护、集体失效</text>
  <text x="500.0" y="402" text-anchor="middle" fill="#6A7480" font-size="13" font-weight="600">一句话：判准稳→值得自动化；判准弱→自动化的维护成本会反噬</text>
