<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <style> text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;} </style>
  <defs>
    <marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0C8F88"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#C2504B"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4A6FA5"/></marker>
    <marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6A7480"/></marker>
  </defs>
  <rect width="1000" height="400" fill="#FFFFFF"/>
  <text x="500.0" y="40" text-anchor="middle" fill="#0F1721" font-size="18" font-weight="800">落地三步 · 拷文件 → 改绑定 → 填经验</text>
  <rect x="55.0" y="90" width="270" height="200" rx="12" fill="#FFFFFF" stroke="#9BD3CE" stroke-width="1.6"/>
  <circle cx="89.0" cy="124" r="20" fill="#0C8F88"/>
  <text x="89.0" y="130" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">1</text>
  <text x="119.0" y="130" text-anchor="start" fill="#0F1721" font-size="17" font-weight="800">拷文件</text>
  <text x="190.0" y="176" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">引擎（命令+skill）</text>
  <text x="190.0" y="206" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">经验层模板</text>
  <text x="190.0" y="236" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">度量工具</text>
  <text x="190.0" y="266" text-anchor="middle" fill="#0C8F88" font-size="13.5" font-weight="700">→ 拷进目标项目</text>
  <line x1="331.0" y1="190.0" x2="359.0" y2="190.0" stroke="#0C8F88" stroke-width="1.8" marker-end="url(#at)"/>
  <rect x="365.0" y="90" width="270" height="200" rx="12" fill="#FFFFFF" stroke="#9BD3CE" stroke-width="1.6"/>
  <circle cx="399.0" cy="124" r="20" fill="#0C8F88"/>
  <text x="399.0" y="130" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">2</text>
  <text x="429.0" y="130" text-anchor="start" fill="#0F1721" font-size="17" font-weight="800">改绑定</text>
  <text x="500.0" y="176" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">声明工作项系统</text>
  <text x="500.0" y="206" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">代码平台 / 浏览器</text>
  <text x="500.0" y="236" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">判仓 / 路由索引</text>
  <text x="500.0" y="266" text-anchor="middle" fill="#0C8F88" font-size="13.5" font-weight="700">→ 引擎按此对接</text>
  <line x1="641.0" y1="190.0" x2="669.0" y2="190.0" stroke="#0C8F88" stroke-width="1.8" marker-end="url(#at)"/>
  <rect x="675.0" y="90" width="270" height="200" rx="12" fill="#FFFFFF" stroke="#9BD3CE" stroke-width="1.6"/>
  <circle cx="709.0" cy="124" r="20" fill="#0C8F88"/>
  <text x="709.0" y="130" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">3</text>
  <text x="739.0" y="130" text-anchor="start" fill="#0F1721" font-size="17" font-weight="800">填经验</text>
  <text x="810.0" y="176" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">从空模板起步</text>
  <text x="810.0" y="206" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">真实提测一次次跑</text>
  <text x="810.0" y="236" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="600">踩坑/判准写回</text>
  <text x="810.0" y="266" text-anchor="middle" fill="#0C8F88" font-size="13.5" font-weight="700">→ 随用随长</text>
  <path d="M905.0,290 q30,44 -190,0" fill="none" stroke="#0C8F88" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#at)"/>
  <text x="810.0" y="342" text-anchor="middle" fill="#0C8F88" font-size="12.5" font-weight="700">每次提测回流，越用越准</text>
  <text x="500.0" y="372" text-anchor="middle" fill="#6A7480" font-size="13" font-weight="600">别指望一次填满 —— 经验层靠一次次提测长出来</text>
</svg>