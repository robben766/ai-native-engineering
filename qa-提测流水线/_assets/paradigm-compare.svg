<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660" width="1040" height="660">
  <style> text{font-family:"Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;} </style>
  <defs>
    <marker id="at" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0C8F88"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4A6FA5"/></marker>
    <marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6A7480"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#C2504B"/></marker>
  </defs>
  <rect width="1040" height="660" fill="#FFFFFF"/>
  <text x="520.0" y="38" text-anchor="middle" fill="#0F1721" font-size="19" font-weight="800">同一次代码改动，两种流法</text>
  <rect x="40" y="64" width="300" height="30" rx="15" fill="#EAF6F5" stroke="#9BD3CE" stroke-width="1.4"/>
  <text x="58" y="84" text-anchor="start" fill="#0C8F88" font-size="14" font-weight="800">方向一 · AI 增效</text>
  <text x="360" y="84" text-anchor="start" fill="#6A7480" font-size="13" font-weight="600">把 AI 拧在既有工序上</text>
  <rect x="48" y="150" width="120" height="60" rx="10" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.5"/>
  <text x="108" y="180" text-anchor="middle" fill="#0F1721" font-size="14" font-weight="700">代码改动</text>
  <text x="108" y="198" text-anchor="middle" fill="#6A7480" font-size="11" font-weight="600">提测</text>
  <rect x="210" y="150" width="470" height="60" rx="10" fill="#FBFDFD" stroke="#9BD3CE" stroke-width="1.5"/>
  <text x="445" y="175" text-anchor="middle" fill="#0F1721" font-size="14" font-weight="800">既有七环 · 每步 AI 辅助</text>
  <text x="445" y="195" text-anchor="middle" fill="#6A7480" font-size="11.5" font-weight="600">变更分析 · 用例 · 评审 · 门禁 · 部署 · E2E · 度量</text>
  <rect x="720" y="150" width="150" height="60" rx="10" fill="#EAF6F5" stroke="#9BD3CE" stroke-width="1.5"/>
  <circle cx="760" cy="171" r="7" fill="none" stroke="#0C8F88" stroke-width="1.8"/>  <path d="M749,192 Q760,178 771,192" fill="none" stroke="#0C8F88" stroke-width="1.8"/>
  <text x="800" y="177" text-anchor="start" fill="#0F1721" font-size="13" font-weight="800">QA</text>
  <text x="800" y="195" text-anchor="start" fill="#6A7480" font-size="11" font-weight="600">末端把关</text>
  <rect x="912" y="150" width="80" height="60" rx="10" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.5"/>
  <text x="952" y="185" text-anchor="middle" fill="#0F1721" font-size="14" font-weight="700">上线</text>
  <line x1="168" y1="180" x2="207" y2="180" stroke="#0C8F88" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="680" y1="180" x2="717" y2="180" stroke="#0C8F88" stroke-width="1.6" marker-end="url(#at)"/>
  <line x1="870" y1="180" x2="909" y2="180" stroke="#0C8F88" stroke-width="1.6" marker-end="url(#at)"/>
  <text x="520.0" y="242" text-anchor="middle" fill="#6A7480" font-size="12.5" font-weight="600">提测 = 一个时点 · 质量靠末端把关 · 增益约 20–40%，天花板 = 旧流程的形状</text>
  <line x1="60" y1="300" x2="980" y2="300" stroke="#D8DEE5" stroke-width="1.3" stroke-dasharray="2 6"/>
  <rect x="40" y="326" width="300" height="30" rx="15" fill="#0C8F88" stroke="#0C8F88" stroke-width="0"/>
  <text x="58" y="346" text-anchor="start" fill="#FFFFFF" font-size="14" font-weight="800">方向二 · AI 原生</text>
  <text x="360" y="346" text-anchor="start" fill="#6A7480" font-size="13" font-weight="600">围绕判准重新设计</text>
  <rect x="430" y="470" width="180" height="74" rx="12" fill="#EAF6F5" stroke="#0C8F88" stroke-width="2"/>
  <text x="520.0" y="502" text-anchor="middle" fill="#0C8F88" font-size="16" font-weight="800">判准库</text>
  <text x="520.0" y="522" text-anchor="middle" fill="#6A7480" font-size="10.5" font-weight="600">什么算对 · agent 可消费的 spec</text>
  <rect x="60" y="472" width="110" height="60" rx="10" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.5"/>
  <text x="115" y="502" text-anchor="middle" fill="#0F1721" font-size="13.5" font-weight="700">代码改动</text>
  <text x="115" y="520" text-anchor="middle" fill="#6A7480" font-size="10.5" font-weight="600">每次</text>
  <rect x="220" y="464" width="150" height="76" rx="10" fill="#FBFDFD" stroke="#B9CBE0" stroke-width="1.5"/>
  <text x="295" y="489" text-anchor="middle" fill="#4A6FA5" font-size="13.5" font-weight="800">dev-agent</text>
  <text x="295" y="508" text-anchor="middle" fill="#0F1721" font-size="11.5" font-weight="600">生成 → 对判准自检</text>
  <text x="295" y="525" text-anchor="middle" fill="#6A7480" font-size="11" font-weight="600">不过就改</text>
  <line x1="170" y1="502" x2="217" y2="502" stroke="#6A7480" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="193" y="494" text-anchor="middle" fill="#6A7480" font-size="10.5" font-weight="600">触发</text>
  <path d="M370,494 H428" fill="none" stroke="#4A6FA5" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="399" y="486" text-anchor="middle" fill="#4A6FA5" font-size="10.5" font-weight="600">查判准</text>
  <path d="M428,522 H372" fill="none" stroke="#4A6FA5" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ab)"/>
  <text x="400" y="536" text-anchor="middle" fill="#4A6FA5" font-size="10.5" font-weight="600">回流</text>
  <rect x="648" y="452" width="150" height="44" rx="10" fill="#FFFFFF" stroke="#0C8F88" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="723" y="470" text-anchor="middle" fill="#0C8F88" font-size="13" font-weight="800">持续验证</text>
  <text x="723" y="486" text-anchor="middle" fill="#6A7480" font-size="10.5" font-weight="600">每次改动都跑</text>
  <line x1="610" y1="478" x2="645" y2="474" stroke="#0C8F88" stroke-width="1.6" marker-end="url(#at)"/>
  <rect x="840" y="452" width="110" height="44" rx="10" fill="#FFFFFF" stroke="#D8DEE5" stroke-width="1.5"/>
  <text x="895" y="474" text-anchor="middle" fill="#0F1721" font-size="13" font-weight="700">持续上线</text>
  <text x="895" y="489" text-anchor="middle" fill="#6A7480" font-size="10" font-weight="600">无独立闸口</text>
  <line x1="798" y1="474" x2="838" y2="474" stroke="#0C8F88" stroke-width="1.6" marker-end="url(#at)"/>
  <circle cx="520" cy="383" r="7" fill="none" stroke="#0F1721" stroke-width="1.8"/>  <path d="M509,404 Q520,390 531,404" fill="none" stroke="#0F1721" stroke-width="1.8"/>
  <text x="548" y="388" text-anchor="start" fill="#0F1721" font-size="12.5" font-weight="800">判准工程师 · 担责</text>
  <path d="M520,408 V466" fill="none" stroke="#0F1721" stroke-width="1.5" marker-end="url(#at)"/>
  <text x="560" y="440" text-anchor="start" fill="#6A7480" font-size="10.5" font-weight="600">编判准 · 签字放行</text>
  <text x="520.0" y="600" text-anchor="middle" fill="#6A7480" font-size="12.5" font-weight="600">验证是持续属性，不是时点 · 提测交接溶解 · 人在判准与判断层 · 增益 = 数量级/重构</text>
</svg>